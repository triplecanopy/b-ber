env: development
src: _project
dist: _builds
ibooks_specified_fonts: false
theme: b-ber-theme-serif
themes_directory: ./themes
base_url: /
base_path: /
remote_url: 'http://localhost:4000/'
reader_url: 'http://localhost:4000/kitchen-sink-reader'
builds:
  - epub
  - reader
ui_options:
  navigation:
    header_icons:
      info: true
      home: true
      downloads: true
      toc: true
    footer_icons:
      chapter: true
      page: true
private: false
ignore: []
