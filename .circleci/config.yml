version: 2.1

orbs:
  # Uploads coverage to Codecov. Reads the upload token from the
  # CODECOV_TOKEN env var configured in the CircleCI project settings.
  codecov: codecov/codecov@4

jobs:
  build:
    # canopycanopycanopy/b-ber:1.0.1 ships Node 16, which is incompatible with
    # the current monorepo (engines >= 22.x). Use Node 24 to match the local
    # dev environment and satisfy tsdown's ^22.18.0 || >=24.0.0 requirement.
    # Switch back to a canopy image once TASK-035 produces an updated one.
    docker:
      - image: cimg/node:24.14
    working_directory: ~/b-ber
    environment:
      NX_SKIP_NX_CACHE: "true"
    steps:
      - checkout
      - run:
          name: Generate npm cache key
          command: |
            echo $(find . -type f -name package.json -not -path "*/node_modules*" -exec md5sum {} \; | md5sum | cut -d' ' -f1) >> BBER_CACHE_KEY
      - restore_cache:
          keys:
            - npm-packages-v2-{{ .Branch }}-{{ checksum "BBER_CACHE_KEY" }}
            - npm-packages-v2-{{ checksum "BBER_CACHE_KEY" }}
      - run:
          name: Install dependencies
          command: |
            echo NodeJS $(node -v)
            echo npm $(npm -v)
            npm ci --ignore-scripts
            echo Lerna $(./node_modules/.bin/lerna -v)
      - run:
          name: Build foundational packages
          command: |
            npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-shapes-directives
            npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-shapes-dublin-core
            npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-shapes-sequences
            npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-logger
      - run:
          name: Build reader-react
          command: npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-reader-react
      - run:
          name: Build remaining packages
          command: |
            npm run lerna run build -- --scope="@canopycanopycanopy/{$(ls packages -xm --width=0 | sed 's/ //g' | sed -E 's/b-ber-reader-react,?//')}" --concurrency=1
      - run:
          name: Run lint and unit tests with coverage
          # Mirrors `npm test` (biome check + jest) but adds coverage so the
          # lcov report can be uploaded to Codecov below. Coverage is scoped
          # to packages/*/src via collectCoverageFrom in jest.config.js.
          command: |
            npm run check
            npx jest --collectCoverage=true --maxWorkers=2
      - codecov/upload:
          file: coverage/lcov.info
      # Smoke test removed: the pre-existing deep import
      # `require('@canopycanopycanopy/b-ber-lib/State')` fails when running
      # the workspace-built CLI directly because b-ber-lib has no `exports`
      # map and no root-level State.js shim. The old CI ran a pre-installed
      # global `bber` from the canopy image so this was never hit. Needs a
      # dedicated fix (exports map on b-ber-lib) before re-adding here.
      - save_cache:
          paths:
            - ~/b-ber/node_modules
          key: npm-packages-v2-{{ .Branch }}-{{ checksum "BBER_CACHE_KEY" }}

  e2e:
    # node:24-bookworm matches the local dev environment (Node 24) and
    # satisfies tsdown's engine requirement. Playwright system deps are
    # installed inline via `playwright install-deps` rather than relying on
    # a pre-built Playwright Docker image, which would need its own Node
    # version audit. Switch to a canopy image once TASK-035 is resolved.
    docker:
      - image: node:24-bookworm
    working_directory: ~/b-ber
    environment:
      CI: "true"
      NO_NETWORK: "true"
      NX_SKIP_NX_CACHE: "true"
    steps:
      - checkout
      - run:
          name: Generate npm cache key
          command: |
            echo $(find . -type f -name package.json -not -path "*/node_modules*" -exec md5sum {} \; | md5sum | cut -d' ' -f1) >> BBER_CACHE_KEY
      - restore_cache:
          keys:
            - npm-packages-v2-{{ .Branch }}-{{ checksum "BBER_CACHE_KEY" }}
            - npm-packages-v2-{{ checksum "BBER_CACHE_KEY" }}
      - run:
          name: Install dependencies
          command: |
            echo NodeJS $(node -v)
            echo npm $(npm -v)
            npm ci --ignore-scripts
      - run:
          name: Build foundational packages
          command: |
            npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-shapes-directives
            npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-shapes-dublin-core
            npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-shapes-sequences
            npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-logger
      - run:
          name: Build packages
          command: |
            npm run lerna run build -- --scope=@canopycanopycanopy/b-ber-reader-react
            npm run lerna run build -- --scope="@canopycanopycanopy/{$(ls packages -xm --width=0 | sed 's/ //g' | sed -E 's/b-ber-reader-react,?//')}" --concurrency=1
      - run:
          name: Link bber to global PATH
          # npm 10 skips creating node_modules/.bin/bber when dist/index.js
          # doesn't exist at install time. globalPath() in CLI test helpers
          # strips node_modules/.bin anyway. npm link puts bber into
          # /usr/local/bin which survives the strip and is found by spawnSync.
          command: npm link
          working_directory: ~/b-ber/packages/b-ber-cli
      - run:
          name: Build kitchen-sink fixture
          # globalSetup.ts skips this if _builds-reader/manifest.json already
          # exists, but _builds-reader/ is gitignored so it must be built here.
          # Uses `node` directly rather than the symlink for the fixture build;
          # the linked global `bber` (from the step above) is used by CLI tests.
          command: node ~/b-ber/packages/b-ber-cli/dist/index.js build reader
          working_directory: ~/b-ber/packages/b-ber-testing/fixtures/kitchen-sink
      - save_cache:
          paths:
            - ~/b-ber/node_modules
          key: npm-packages-v2-{{ .Branch }}-{{ checksum "BBER_CACHE_KEY" }}
      - run:
          name: Install zip and Java (required by epub-zipper for EPUB
            archive creation and EPUBCheck validation)
          command: apt-get update && apt-get install -y zip default-jre-headless
      - restore_cache:
          keys:
            - playwright-v1-{{ checksum "packages/b-ber-testing/package.json" }}
      - run:
          name: Install Playwright system dependencies
          command: npx playwright install-deps chromium
          working_directory: ~/b-ber/packages/b-ber-testing
      - run:
          name: Install Playwright browser
          command: npx playwright install chromium
          working_directory: ~/b-ber/packages/b-ber-testing
      - save_cache:
          paths:
            - ~/.cache/ms-playwright
          key: playwright-v1-{{ checksum "packages/b-ber-testing/package.json" }}
      - run:
          name: Run e2e tests
          command: npm test
          working_directory: ~/b-ber/packages/b-ber-testing

workflows:
  build_and_test:
    jobs:
      # No branch filters: build + e2e run on every push and pull request.
      - build
      - e2e:
          requires:
            - build
